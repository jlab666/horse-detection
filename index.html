<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬匹辨識 PoC (YOLOv9 Web App)</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 640px; 
            height: 480px; 
            margin: 20px auto; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video, canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        canvas { 
            z-index: 10; 
        }
        #alertBanner { 
            display: none; 
            background: #ff3333; 
            color: white; 
            padding: 15px; 
            font-weight: bold; 
            font-size: 1.3rem; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .controls { 
            margin-top: 20px; 
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            font-size: 1rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { 
            background: #0056b3; 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

    <h1>🐎 即時馬匹偵測系統 (YOLOv9)</h1>
    <div id="alertBanner">⚠️ 偵測到馬匹 ⚠️</div>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="controls">
        <button id="snapBtn">📸 拍攝快照 (儲存至本機)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
